<!DOCTYPE html><html><head><meta charset="utf-8"><title>Loan Approval Dashboard</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{font-family:Arial;margin:20px;background:#f4f7fb} .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}.card{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 6px #ccc}.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}canvas{background:white;border-radius:12px;padding:10px}</style></head><body><h1>🏦 Loan Approval Dashboard</h1><input type="file" id="csvFile" accept=".csv"><div class="cards"><div class="card"><h3 id="apps">0</h3><p>Applications</p></div><div class="card"><h3 id="approved">0</h3><p>Approved</p></div><div class="card"><h3 id="rejected">0</h3><p>Rejected</p></div><div class="card"><h3 id="rate">0%</h3><p>Approval Rate</p></div></div><div class="charts"><canvas id="statusChart"></canvas><canvas id="areaChart"></canvas></div><script>document.getElementById('csvFile').addEventListener('change',e=>{const f=e.target.files[0];const r=new FileReader();r.onload=x=>{const rows=x.target.result.trim().split(/?
/).map(a=>a.split(','));const h=rows[0];const data=rows.slice(1);const s=h.indexOf('Loan_Status');const a=h.indexOf('Property_Area');let approved=0,rejected=0,area={};data.forEach(r=>{if(r[s]=='Y')approved++;else if(r[s]=='N')rejected++;area[r[a]]=(area[r[a]]||0)+1;});document.getElementById('apps').innerText=data.length;document.getElementById('approved').innerText=approved;document.getElementById('rejected').innerText=rejected;document.getElementById('rate').innerText=((approved/data.length)*100).toFixed(1)+'%';new Chart(document.getElementById('statusChart'),{type:'doughnut',data:{labels:['Approved','Rejected'],datasets:[{data:[approved,rejected]}]}});new Chart(document.getElementById('areaChart'),{type:'bar',data:{labels:Object.keys(area),datasets:[{label:'Applications',data:Object.values(area)}]}});};r.readAsText(f);});</script></body></html>
